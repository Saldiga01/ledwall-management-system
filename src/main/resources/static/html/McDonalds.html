<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McDonalds</title>
    <link rel="stylesheet" href="../css/McDonalds.css">
</head>

<body>
<p id="header">MY SELECTION 2024</p>
<p id="p-banner">GLI HAMBURGER McDONALD'S MIGLIORI DI SEMPRE!</p>

<div id="container">
    <main>
        <div id="div-sx">
            <img id="left-image" src="../images/myselection-chicken-avocado--isolated.png" alt="Immagine grande">
            <div id="div-bottom-sx">
                <h2 id="main-title">Chicken Avocado & Bacon</h2>
                <img id="sale-logo1" src="../images/Novita_icona.png" alt="novità">
            </div>
        </div>
        <img id="logoMys" src="../images/logo-mys.png" alt="mySelection">
    </main>

    <aside>
        <div class="right-images">
            <img id="img1-dx" src="../images/mys-bbq--hero-isolated.png" alt="Immagine piccola 1">
            <div id="mini-div1">
                <h2 id="h3-dx_1">BBQ</h2>
            </div>
        </div>
        <div class="right-images">
            <img id="img2-dx" src="../images/myselection-speck-asiago--isolated.png" alt="Immagine piccola 2">
            <div id="mini-div2">
                <h2 id="h3-dx_2">Speck & Asiago</h2>
                <img class="sale-logo2" src="../images/Novita_icona.png" alt="novità">
            </div>
        </div>
    </aside>
</div>
<div id="div-lower">
    <p id="p-lower">
        <span class="tabbed">Scopri il gusto unico dei nostri burger in:</span>
        <span class="tabbed">P.za Giulio Cesare, 43, 90127 Palermo PA</span>
        <span class="tabbed">P.za Matteo Maria Boiardo, 90144 Palermo PA</span>
        <span class="tabbed">Via Pecoraino c/o CC Forum, 90124 Palermo PA</span>
    </p>
</div>
</body>
</html>
