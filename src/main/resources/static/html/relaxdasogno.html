<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>RELAX DA SOGNO</title>
        <link rel="stylesheet" href="../css/style_relaxdasogno.css">
    </head>

    <body>
        <p id="header">RELAX DA SOGNO</p>
        <p id="p-banner"> NUOVISSIME OFFERTE</p>

        <div id="container">
            <main>
                <div id="div-sx">
                    <img id="left-image" src="../images/Sofa-blu-PNG.png" alt="Immagine grande">
                    <div id="div-bottom-sx">
                        <h2 id="main-title">DIVANO LETTO MODERN STYLE</h2>
                        <img id="sale-logo1" src="../images/sale-icon.png">
                    </div>
                </div>
                <img id="scritta-sogni" src="../images/scritta-sogni.PNG">
            </main>

            <aside>
                <div class="right-images">
                    <img id="img1-dx" src="../images/sofa-rosso.png" alt="Immagine piccola 1">
                    <div id="mini-div1">
                        <h2 class="h3-dx">SOFA' ROSSO PREMIUM</h2>
                        <img class="sale-logo2" src="../images/sale-icon.png">
                    </div>
                </div>
                <div class="right-images">
                    <img id="img2-dx" src="../images/poltrona-blu.png" alt="Immagine piccola 2">
                    <div id="mini-div2">
                        <h2 class="h3-dx">POLTRONA QUALITY</h2>
                        <img class="sale-logo2" src="../images/sale-icon.png">
                    </div>
                </div>
            </aside>
        </div>
        <div id="div-lower">
            <p id="p-lower">
                <span class="tabbed">Vienici a trovare in:</span>
                <span class="tabbed">Viale Francia, 10, 90146 Palermo PA</span>
                <span class="tabbed">Via della Libertà, 199, 90143 Palermo PA</span>
                <span class="tabbed">Via Gaetano Lodato, 18d, 90127 Palermo PA</span>
            </p>
        </div>
