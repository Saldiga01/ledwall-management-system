<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Impianti</title>
    <link rel="stylesheet" href="/css/gestioneImpianti.css">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="/js/gestione.js"></script>

</head>
<body>
<div th:insert="~{fragments/header :: block-header}"></div>

<h1>Gestione Impianti</h1>
<div class="custom-alert" id="customAlert">
    <p id="alertMessage"></p>
    <button id="okButton">OK</button>
</div>

<table>
    <thead>
    <tr>
        <th>ID IMPIANTO</th>
        <th>DESCRIZIONE</th>
        <th>STATO</th>
        <th>PALINSESTO</th>
        <th>AZIONI</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="impianto : ${impianti}">
        <td th:text="${impianto.id}"></td>
        <td>
            <input type="text" id="descrizioneUpdate" th:name="descrizioneImp" th:value="${impianto.descrizione}" class="disabled-input" title="Clicca per abilitare le modifiche"readonly>
        </td>
        <td>
            <form th:action="@{/updateImpianto}" method="post" name="formStato">
                <input type="hidden" th:name="id" th:value="${impianto.id}"/>
                <div class="radio-buttons">
                    <label>
                        <input type="radio" th:name="stato" th:value="1" th:checked="${impianto.stato == 1}" >
                        <span class="radio-label active" title="Attiva Impianto"></span>
                    </label>
                    <label>
                        <input type="radio" th:name="stato" th:value="0" th:checked="${impianto.stato == 0}" >
                        <span class="radio-label inactive" title="Disattiva Impianto"></span>
                    </label>
                </div>
                <div class="alert-message"></div>
            </form>
        </td>
        <td>
            <form th:action="@{/updateImpianto}" method="post" name="formPalinsesto">
                <input type="hidden" th:name="idPal" th:value="${impianto.id}"/>
                <select th:name="palinsesto">
                    <option th:each="palinsesto : ${palinsesti}" th:value="${palinsesto.idPalinsesto}"
                            th:text="${palinsesto.nomePalinsesto}" th:selected="${palinsesto.pathPalinsesto == impianto.pathPalinsesto}"></option>
                </select>
            </form>
        </td>
        <td id="buttons">
            <button type="submit" name="submit">Aggiorna</button>
            <button type="submit" name="delete">Elimina</button>
        </td>
    </tr>
    </tbody>
</table>

<div id="showFormButtonContainer">
    <button id="showFormButton">Aggiungi Impianto</button>
</div>

<div id="addImpiantoModal" class="modal">
    <div class="modal-content">
        <h3>Compila i seguenti campi per inserire un nuovo impianto</h3>
        <form id="addImpiantoForm" th:action="@{/addImpianto}" method="post" name="addForm">
            <label for="descrizione">Descrizione</label>
            <input type="text" id="descrizione" name="descrizione" required>

            <a href="#" id="openMapLink">Seleziona dalla mappa</a>
            <label for="latitudine">Latitudine</label>
            <input type="text" id="latitudine" name="latitudine" required>

            <label for="longitudine">Longitudine</label>
            <input type="text" id="longitudine" name="longitudine" required>

            <label for="palinsesto">Path Palinsesto</label>
            <select id="palinsesto" name="palinsesto" required>
                <option th:each="palinsesto : ${palinsesti}" th:value="${palinsesto.idPalinsesto}"
                        th:text="${palinsesto.nomePalinsesto}"></option>
            </select>

            <label for="stato">Stato</label>
            <select id="stato" name="stato">
                <option value="1">Attivo</option>
                <option value="0">Disattivo</option>
            </select>

            <button type="submit" name="add">AGGIUNGI IMPIANTO</button>
        </form>
        <span id="closeFormButton" class="close">&times;</span>
    </div>
</div>

<div id="mapModal" class="modal">
    <div class="modal-content">
        <h4>Seleziona la posizione del nuovo impianto sulla mappa</h4>
        <div id="map" style="width: 100%; height: 80%;"></div>
        <span id="closeMapButton" class="close">&times;</span>
    </div>
</div>
<div id="logoutContainer">
    <form th:action="@{/logout}" method="post" id="logoutButton">
        <input id="bottomLogout" type="submit" value="LOGOUT"/>
    </form>
</div>
<footer th:insert="~{fragments/footer :: block-footer}"></footer>
</body>
</html>
